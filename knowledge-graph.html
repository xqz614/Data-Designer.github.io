<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Graph</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background-color: transparent;
        }
        #knowledge-graph {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        .node text {
            font-family: Arial, sans-serif;
            text-anchor: start;
            white-space: nowrap;
            /* 文字抗锯齿+白色描边，提升可读性 */
            paint-order: stroke fill;
            stroke: white;
            stroke-width: 2px;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .link {
            stroke: #ccc;
            stroke-opacity: 0.8;
        }
        /* 悬浮提示样式 */
        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px; /* 放大提示文字 */
            pointer-events: none;
            z-index: 1000;
            max-width: 350px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div id="knowledge-graph"></div>
    <!-- 悬浮提示容器 -->
    <div class="tooltip" style="display: none;"></div>

    <script>
    const graphData = {
      nodes: [
        { id: "paper-2025-tnnls", name: "Enhancing Domain Generalization in Medical Image Segmentation", group: 1 },
        { id: "paper-2025-tweb", name: "Cross-domain Transfer of Valence Preferences via Meta-optimization", group: 1 },
        { id: "paper-2025-tkde", name: "Collaborative Knowledge Fusion for Multi-task Recommender Systems", group: 1 },
        { id: "paper-2025-kdd", name: "Diffmv: Unified Diffusion Framework for Healthcare Predictions", group: 1 },
        { id: "paper-2025-tois", name: "Beyond Sequential Patterns: Healthcare Predictions with Contextual Insights", group: 1 },
        { id: "paper-2025-naacl", name: "Instruct-of-Reflection: Enhancing LLM Iterative Reflection", group: 1 },
        { id: "paper-2025-www", name: "Unveiling Discrete Clues: Healthcare Predictions for Rare Diseases", group: 1 },
        { id: "paper-2024-tkde", name: "Enhancing Precision Drug Recommendations via Motif Relationships", group: 1 },
        { id: "paper-2024-kdd", name: "Performative Debias with Fair-exposure Optimization", group: 1 },
        { id: "paper-2024-tsmc", name: "Bi-discriminator Domain Adversarial Neural Networks", group: 1 },
        { id: "paper-2023-tkde", name: "Cross-Domain Recommendation via Progressive Structural Alignment", group: 1 },
        { id: "paper-2023-cikm", name: "Sequential recommendation via adaptive cross-domain knowledge decomposition", group: 1 },
        { id: "paper-2023-www", name: "Cross-domain recommendation via user interest alignment", group: 1 },
        { id: "paper-2022-joc", name: "Ensemble Learning with Gradient Resampling for Class-imbalanced problems", group: 1 },
        { id: "paper-2022-www", name: "Winning Tracker: Real-time Winning Prediction in MOBA Games", group: 1 },
        { id: "paper-2022-aaai1", name: "Multi-dimensional Prediction of Guild Health in Online Games", group: 1 },
        { id: "paper-2022-aaai2", name: "Co-Promotion Predictions of Financing and Sales Market", group: 1 },
        { id: "paper-2022-tevc", name: "CoEA: Cooperative–Competitive Evolutionary Algorithm for Bidirectional Recommendations", group: 1 },
        { id: "paper-2020-icis", name: "Machine Learning for Measuring Information Disclosure in Sharing Economy", group: 1 },
        { id: "paper-2020-jssms", name: "Fresh Food Logistics Risk Assessment Based on Bayesian Network", group: 1 },
        { id: "jour-tnnls", name: "TNNLS", group: 2 },
        { id: "jour-tweb", name: "TWeb", group: 2 },
        { id: "jour-tkde", name: "TKDE", group: 2 },
        { id: "jour-kdd", name: "KDD", group: 2 },
        { id: "jour-tois", name: "TOIS", group: 2 },
        { id: "jour-naacl", name: "NAACL", group: 2 },
        { id: "jour-www", name: "WWW", group: 2 },
        { id: "jour-tsmc", name: "TSMC", group: 2 },
        { id: "jour-cikm", name: "CIKM", group: 2 },
        { id: "jour-joc", name: "JOC", group: 2 },
        { id: "jour-aaai", name: "AAAI", group: 2 },
        { id: "jour-tevc", name: "TEVC", group: 2 },
        { id: "jour-icis", name: "ICIS", group: 2 },
        { id: "jour-jssms", name: "JSSMS", group: 2 },
        { id: "kw-recommender", name: "Recommender System", group: 3 },
        { id: "kw-transfer", name: "Transfer Learning", group: 3 },
        { id: "kw-ai4science", name: "AI for Science", group: 3 },
        { id: "kw-healthcare", name: "Healthcare Prediction", group: 3 },
        { id: "kw-domain-adapt", name: "Domain Adaptation", group: 3 },
        { id: "kw-llm", name: "Large Language Model", group: 3 },
        { id: "kw-games", name: "Game Analytics", group: 3 },
        { id: "kw-imbalanced", name: "Class Imbalance", group: 3 },
        { id: "kw-sharing-econ", name: "Sharing Economy", group: 3 },
        { id: "kw-logistics", name: "Logistics Risk", group: 3 }
      ],
      links: [
        { source: "paper-2025-tnnls", target: "jour-tnnls", value: 1 },
        { source: "paper-2025-tweb", target: "jour-tweb", value: 1 },
        { source: "paper-2025-tkde", target: "jour-tkde", value: 1 },
        { source: "paper-2025-kdd", target: "jour-kdd", value: 1 },
        { source: "paper-2025-tois", target: "jour-tois", value: 1 },
        { source: "paper-2025-naacl", target: "jour-naacl", value: 1 },
        { source: "paper-2025-www", target: "jour-www", value: 1 },
        { source: "paper-2024-tkde", target: "jour-tkde", value: 1 },
        { source: "paper-2024-kdd", target: "jour-kdd", value: 1 },
        { source: "paper-2024-tsmc", target: "jour-tsmc", value: 1 },
        { source: "paper-2023-tkde", target: "jour-tkde", value: 1 },
        { source: "paper-2023-cikm", target: "jour-cikm", value: 1 },
        { source: "paper-2023-www", target: "jour-www", value: 1 },
        { source: "paper-2022-joc", target: "jour-joc", value: 1 },
        { source: "paper-2022-www", target: "jour-www", value: 1 },
        { source: "paper-2022-aaai1", target: "jour-aaai", value: 1 },
        { source: "paper-2022-aaai2", target: "jour-aaai", value: 1 },
        { source: "paper-2022-tevc", target: "jour-tevc", value: 1 },
        { source: "paper-2020-icis", target: "jour-icis", value: 1 },
        { source: "paper-2020-jssms", target: "jour-jssms", value: 1 },
        { source: "paper-2025-tweb", target: "kw-transfer", value: 1 },
        { source: "paper-2025-tkde", target: "kw-recommender", value: 1 },
        { source: "paper-2025-kdd", target: "kw-healthcare", value: 1 },
        { source: "paper-2025-tois", target: "kw-healthcare", value: 1 },
        { source: "paper-2025-naacl", target: "kw-llm", value: 1 },
        { source: "paper-2025-www", target: "kw-healthcare", value: 1 },
        { source: "paper-2024-tkde", target: "kw-recommender", value: 1 },
        { source: "paper-2024-kdd", target: "kw-recommender", value: 1 },
        { source: "paper-2024-tsmc", target: "kw-domain-adapt", value: 1 },
        { source: "paper-2023-tkde", target: "kw-recommender", value: 1 },
        { source: "paper-2023-tkde", target: "kw-transfer", value: 1 },
        { source: "paper-2023-cikm", target: "kw-recommender", value: 1 },
        { source: "paper-2023-www", target: "kw-recommender", value: 1 },
        { source: "paper-2023-www", target: "kw-transfer", value: 1 },
        { source: "paper-2022-joc", target: "kw-imbalanced", value: 1 },
        { source: "paper-2022-www", target: "kw-games", value: 1 },
        { source: "paper-2022-aaai1", target: "kw-games", value: 1 },
        { source: "paper-2022-tevc", target: "kw-recommender", value: 1 },
        { source: "paper-2020-icis", target: "kw-sharing-econ", value: 1 },
        { source: "paper-2020-jssms", target: "kw-logistics", value: 1 },
        { source: "paper-2025-tnnls", target: "kw-ai4science", value: 1 },
        { source: "paper-2025-kdd", target: "kw-ai4science", value: 1 },
        { source: "paper-2025-tois", target: "kw-ai4science", value: 1 },
        { source: "paper-2025-www", target: "kw-ai4science", value: 1 },
        { source: "kw-recommender", target: "kw-ai4science", value: 1 },
        { source: "kw-transfer", target: "kw-ai4science", value: 1 },
        { source: "kw-healthcare", target: "kw-ai4science", value: 1 }
      ]
    };

    // 工具函数：截断长文本（放大字体后适度增加截断长度）
    function truncateText(text, maxLength) {
        if (text.length <= maxLength) return text;
        return text.substring(0, maxLength) + "...";
    }

    // 优化力导向布局：适配放大后的节点/字体
    const svg = d3.select("#knowledge-graph")
      .append("svg")
      .attr("width", "100%")
      .attr("height", "100%")
      .attr("viewBox", [0, 0, 2000, 1400]) // 进一步增大画布空间
      .attr("preserveAspectRatio", "xMidYMid meet");

    const simulation = d3.forceSimulation(graphData.nodes)
      .force("link", d3.forceLink(graphData.links).id(d => d.id)
        .distance(d => {
          // 适配放大后的节点，增大链接距离
          if (d.source.group === 1 && d.target.group === 2) return 220;
          if (d.source.group === 1 && d.target.group === 3) return 280;
          return 330;
        })
        .strength(0.6)
      )
      .force("charge", d3.forceManyBody().strength(-1200)) // 增强排斥力，避免放大后拥挤
      .force("center", d3.forceCenter(1000, 700)) // 对应新画布中心
      .force("collision", d3.forceCollide().radius(110)); // 增大碰撞半径，适配放大的节点+文字

    // 绘制连接线（适度加粗）
    const link = svg.append("g")
      .attr("class", "link")
      .selectAll("line")
      .data(graphData.links)
      .enter().append("line")
      .attr("stroke-width", d => Math.sqrt(d.value * 3)); // 加粗连接线，适配放大的视觉效果

    // 节点颜色
    const color = d3.scaleOrdinal()
      .domain([1, 2, 3])
      .range(["#2563eb", "#0d9488", "#9333ea"]);

    // 获取tooltip元素
    const tooltip = d3.select(".tooltip");

    const node = svg.append("g")
      .selectAll(".node")
      .data(graphData.nodes)
      .enter().append("g")
      .attr("class", "node")
      // 鼠标悬浮显示完整标题
      .on("mouseover", function(event, d) {
        tooltip.style("display", "block")
          .style("left", (event.pageX + 10) + "px")
          .style("top", (event.pageY + 10) + "px")
          .text(d.name);
      })
      .on("mouseout", function() {
        tooltip.style("display", "none");
      })
      .call(d3.drag()
        .on("start", dragstarted)
        .on("drag", dragged)
        .on("end", dragended));

    // 放大节点半径（平衡视觉效果，避免过大导致重叠）
    node.append("circle")
      .attr("r", d => {
        if (d.group === 1) return 32;  // 论文节点（原15 → 放大到22）
        if (d.group === 2) return 34;  // 期刊节点（原18 → 放大到24）
        return 36;                     // 关键词节点（原20 → 放大到26）
      })
      .attr("fill", d => color(d.group))
      .attr("stroke", "#fff")
      .attr("stroke-width", 2); // 加粗描边，增强视觉效果

    // 放大字体+优化间距
    node.append("text")
      .attr("dx", 35) // 适度增大间距，避免文字覆盖放大后的节点
      .attr("dy", ".35em")
      // 放大字体+适度增加截断长度
      .text(d => {
        let maxLength = 25; // 论文标题（原20 → 增加到25）
        if (d.group === 2) maxLength = 12; // 期刊名（原10 → 增加到12）
        if (d.group === 3) maxLength = 18; // 关键词（原15 → 增加到18）
        return truncateText(d.name, maxLength);
      })
      .style("font-size", d => {
        // 放大字体（原12/14/13 → 调整为16/18/17）
        if (d.group === 1) return "40px";
        if (d.group === 2) return "41px";
        return "39px";
      })
      .style("fill", "#222")
      .style("font-weight", 500)
      .style("pointer-events", "none");

    simulation.on("tick", () => {
      link
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x)
        .attr("y2", d => d.target.y);

      node
        .attr("transform", d => `translate(${d.x},${d.y})`);
    });

    // 拖拽函数
    function dragstarted(event, d) {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      d.fx = d.x;
      d.fy = d.y;
    }
    function dragged(event, d) {
      d.fx = event.x;
      d.fy = event.y;
    }
    function dragended(event, d) {
      if (!event.active) simulation.alphaTarget(0);
      d.fx = null;
      d.fy = null;
    }
    </script>
</body>
</html>
